services:
  genesis-tribunal:
    build: .
    container_name: genesis-tribunal
    ports:
      - "8910:8910"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DEADMAN_HOST=genesis-tribunal-deadman
      - DEADMAN_PORT=8911
    depends_on:
      - genesis-tribunal-deadman
    networks:
      - tribunal-net

  genesis-tribunal-deadman:
    image: node:20-alpine
    container_name: genesis-tribunal-deadman
    working_dir: /app
    volumes:
      - ./deadman:/app/deadman:ro
    command: ["node", "/app/deadman/deadman.js"]
    ports:
      - "8911:8911"
    restart: unless-stopped
    environment:
      - DEADMAN_PORT=8911
    networks:
      - tribunal-net

networks:
  tribunal-net:
    driver: bridge
